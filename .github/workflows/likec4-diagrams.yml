name: Regenerate LikeC4 diagrams

on:
  push:
    branches: [main]
    paths:
      - 'docs/likec4/**/*.c4'
      - 'docs/likec4/package.json'
      - 'docs/likec4/package-lock.json'
      - '.github/workflows/likec4-diagrams.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs/likec4/package-lock.json

      - name: Install dependencies
        working-directory: docs/likec4
        run: npm ci --include=optional

      # rolldown ships its native binding as platform-specific optionalDependencies,
      # which `npm ci --include=optional` resolves per platform. Force-install the
      # Linux x64 binding as insurance against flaky optional-dep resolution on CI.
      - name: Ensure Linux rolldown binding
        working-directory: docs/likec4
        run: npm install --no-save @rolldown/binding-linux-x64-gnu

      - name: Install Playwright Chromium
        working-directory: docs/likec4
        run: npx playwright install --with-deps chromium

      - name: Validate .c4 sources
        working-directory: docs/likec4
        run: npm run validate

      - name: Regenerate PNGs
        working-directory: docs/likec4
        run: npm run export

      - name: Commit refreshed diagrams
        run: |
          if git diff --quiet -- docs/diagrams; then
            echo "No diagram changes to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/diagrams
          git commit -m 'chore(diagrams): regenerate LikeC4 PNGs'
          git push
